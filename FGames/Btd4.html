<!DOCTYPE html>
<html>
<head>
    <meta charset='utf8'>
    <title>Ruffle SWF Embed Example</title>
</head>
<body>
    <!-- The container where the Flash content will be embedded -->
    <div id="ruffle-container" style="width: 500px; height: 500px;"></div>

    <!-- Include the Ruffle script from a CDN -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <!-- JavaScript to initialize Ruffle and load the SWF -->
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            // Get the newest Ruffle instance
            const ruffle = window.RufflePlayer.newest();
            // Create a player instance
            const player = ruffle.createPlayer();
            // Get the container element
            const container = document.getElementById("ruffle-container");
            // Append the player to the container
            container.appendChild(player);
            // Load the SWF file
            player.load({
                url: "/SWFs/bloonstd4.swf", // Replace with the actual path to your SWF file
                backgroundColor: "#000000", // Optional: set a background color
            });
        });
    </script>

</body>
</html>
