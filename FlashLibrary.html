<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="Media/Imgs/Bliss_(Windows_XP).png" />
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <title>My Harmony Portal</title>

    <style>
        body {
            justify-content: center;
            background-color: rgb(37, 37, 37);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #game-buttons button {
            margin: 6px;
            padding: 8px 14px;
            font-size: 16px;
            cursor: pointer;
        }

        #ruffle-container {
            
            width: 600px;
            height: 400px;
            border: 10px solid #ffffff;
            margin-top: 20px;
            margin-left: auto;
            margin-right: auto;
        }
        .TopBar {
            display: flex;  
            border: 10px outset rgb(169, 169, 169);
            background-color: rgb(37, 37, 37);
            text-align: start;
            height: 50px;
            overflow-x: scroll;
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <h1>Flash Library</h1>

    <p>Click 2 swap</p>

    <div class="TopBar">
        <button class="swapbutton" data-swf="bloonstd5.swf">Bloons TD 5</button>
        <button class="swapbutton" data-swf="bloonstd4.swf">Bloons TD 4</button>
        <button class="swapbutton" data-swf="supermario63.swf">Super Mario 63</button>
        <button class="swapbutton" data-swf="unfairmario.swf">Unfair mario</button>
        <button class="swapbutton" data-swf="giveuprobot2.swf">Give up Robot 2</button>
        <button class="swapbutton" data-swf="giveuprobot.swf">Give up Robot</button>
        <button class="swapbutton" data-swf="MPNC.swf">Mc Project Nexus Classic</button>
        <button class="swapbutton" data-swf="portal2d.swf">Portal 2D</button>
        <button class="swapbutton" data-swf="run2.swf">Run 2</button>
        <button class="swapbutton" data-swf="run3-new.swf">Run 3</button>
        <button class="swapbutton" data-swf="flash_bloxorz.swf">Bloxorz</button>
    </div>

    <div id="ruffle-container"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};

        function loadGame(swfFile) {
            const container = document.getElementById("ruffle-container");

            // Clear previous game
            container.innerHTML = "";

            // Create new Ruffle player
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();

            container.appendChild(player);

            // Load the selected SWF
            player.load({
                url: "SWFs/" + swfFile,
                backgroundColor: "#000000",
            });
        }

        // Attach button listeners
        document.querySelectorAll(".swapbutton").forEach(btn => {
            btn.addEventListener("click", () => {
                const swf = btn.dataset.swf;
                loadGame(swf);
            });
        });
    </script>

</body>
</html>
